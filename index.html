<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>TSDCI QA/QC Punchlist</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#eeede9;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);--text:#1a1917;--text2:#6b6860;--accent:#1d4ed8;--red:#b91c1c;--green:#166534;--radius:12px;--radius-sm:8px}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--surface:#1c1c1a;--surface2:#252523;--border:rgba(255,255,255,.08);--text:#f0efe9;--text2:#a09e99;--accent:#60a5fa;--red:#fca5a5;--green:#86efac}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"SF Pro Text",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;font-size:15px}
#gate{display:flex;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center;padding:24px}
.gate-box{width:100%;max-width:360px}
.gate-logo{font-size:36px;text-align:center}
.gate-title{font-size:20px;font-weight:600;text-align:center}
.gate-sub{font-size:13px;color:var(--text2);margin-bottom:20px;text-align:center}
.gate-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px;font-size:16px;margin-bottom:12px}
.gate-btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:14px;font-weight:600;cursor:pointer}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 16px 0;position:sticky;top:0;z-index:100}
.topbar-inner{display:flex;justify-content:space-between;align-items:center;height:52px}
.app-title{font-size:18px;font-weight:600;display:flex;gap:8px;align-items:center}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#9ca3af}
.sync-dot.online{background:#22c55e}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.stat{background:var(--surface);border-radius:var(--radius-sm);padding:10px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:20px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--text2)}
.filters{padding:0 16px 10px;display:flex;gap:6px;overflow-x:auto}
.filter-chip{white-space:nowrap;font-size:13px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer}
.filter-chip.active{background:var(--text);color:var(--bg)}
.list{padding:0 16px 80px}
.item{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;padding:14px}
.item-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between}
.item-details{flex:1}
.item-desc{font-weight:600}
.item-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px}
.badge-critical{background:#fef2f2;color:#b91c1c}
.badge-high{background:#fff7ed;color:#c2410c}
.badge-medium{background:#fffbeb;color:#92400e}
.badge-low{background:#f0fdf4;color:#166534}
.badge-open{background:#eff6ff;color:#1d4ed8}
.badge-progress{background:#fffbeb;color:#92400e}
.badge-closed{background:#f0fdf4;color:#166534}
.badge-void{background:#eeede9;color:#6b6860}
.item-note{font-size:12px;color:var(--text2);margin-top:6px;background:var(--surface2);padding:6px;border-radius:8px}
.photo-thumb{width:60px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--border2);cursor:pointer}
.photo-strip{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
.status-pri-select{display:flex;gap:8px;align-items:center}
select.small-select{padding:4px 8px;border-radius:16px;background:var(--surface2);border:1px solid var(--border2);font-size:12px}
.upload-btn-small{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer}
.delete-btn{background:#fee2e2;border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;color:#b91c1c}
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--text);color:var(--bg);border:none;font-size:28px;box-shadow:0 4px 12px rgba(0,0,0,.3);cursor:pointer;z-index:200}
.sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;transition:opacity .25s}
.sheet-backdrop.open{display:block;opacity:1}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:0 16px 24px;z-index:400;transform:translateY(100%);transition:transform .3s;max-height:92dvh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:18px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:5px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px;font-size:15px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.submit-btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:14px;font-weight:600;cursor:pointer;margin-top:8px}
.export-btn{width:100%;background:var(--accent);color:#fff;border-radius:var(--radius);padding:14px;font-weight:600;cursor:pointer;display:flex;gap:8px;justify-content:center}
#preview-modal{display:none;position:fixed;inset:0;background:var(--bg);z-index:900;flex-direction:column}
#preview-modal.open{display:flex}
.preview-header{background:var(--surface);padding:16px;display:flex;justify-content:space-between}
.preview-body{flex:1;overflow:auto;padding:20px;background:#525659}
#pdf-content{background:#fff;width:100%;max-width:297mm;margin:0 auto;box-sizing:border-box}
.pdf-page{background:#fff;color:#000;padding:15mm 20mm;font-family:Arial,sans-serif;page-break-after:always}
.pdf-header-logo{text-align:left;margin-bottom:15px;border-bottom:2px solid #333;padding-bottom:10px}
.pdf-logo-img{height:70px;width:auto;object-fit:contain}
.pdf-title{text-align:center;font-weight:bold;background:#eef2ff;padding:6px;margin:10px 0;color:#000}
.pdf-info-grid{display:flex;justify-content:space-between;font-size:10px;border:1px solid #ccc;padding:8px;margin-bottom:15px;color:#000}
.pdf-legend-table{margin:15px 0;width:100%;border-collapse:collapse;font-size:9px}
.pdf-legend-table td{padding:5px 8px;border:1px solid #000;text-align:center;font-weight:bold}
.pdf-table{width:100%;border-collapse:collapse;font-size:8.5px;color:#000;table-layout:fixed;page-break-inside:avoid}
.pdf-table th,.pdf-table td{border:1px solid #000;padding:6px;vertical-align:top;break-inside:avoid;page-break-inside:avoid}
.pdf-table th{background:#e5e7eb;text-align:center}
.pdf-img{max-width:70px;max-height:55px;width:auto;height:auto;object-fit:contain;display:block;margin:0 auto}
.pdf-footer{text-align:center;font-size:8px;border-top:1px solid #ccc;padding-top:8px;margin-top:20px;color:#000}
.empty{text-align:center;padding:40px;color:var(--text2)}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">🔨</div>
    <h2 class="gate-title">TSDCI QA/QC Punchlist</h2>
    <p class="gate-sub">Enter the project password</p>
    <input id="gate-password" class="gate-input" type="password" placeholder="Password" />
    <button class="gate-btn" onclick="checkPassword()">Unlock</button>
    <p id="gate-err" class="gate-err" style="color:var(--red);margin-top:10px"></p>
  </div>
</div>

<div id="main-app" style="display:none">
<div class="topbar"><div class="topbar-inner"><div class="app-title"><span>📋 Punchlist</span><div class="sync-dot" id="sync-dot"></div></div><div><button class="icon-btn" onclick="openExport()">⬆</button></div></div></div>
<div class="stats-row"><div class="stat"><div class="stat-num" id="cnt-open">0</div><div class="stat-lbl">Open</div></div><div class="stat"><div class="stat-num" id="cnt-high">0</div><div class="stat-lbl">Critical (H)</div></div><div class="stat"><div class="stat-num" id="cnt-prog">0</div><div class="stat-lbl">In Progress</div></div><div class="stat"><div class="stat-num" id="cnt-done">0</div><div class="stat-lbl">Closed</div></div></div>
<div class="filters" id="filters-container"><div class="filter-chip active" data-filter="all">All</div><div class="filter-chip" data-filter="OPEN">Open</div><div class="filter-chip" data-filter="IN PROGRESS">In Progress</div><div class="filter-chip" data-filter="CLOSED">Closed</div><div class="filter-chip" data-filter="VOIDED">Voided</div></div>
<div class="list" id="list"><div class="empty">Loading items...</div></div>
<button class="fab" onclick="openAdd()">+</button>

<div class="sheet-backdrop" id="add-backdrop" onclick="closeAdd()"></div>
<div class="sheet" id="add-sheet"><div class="sheet-handle"></div><div class="sheet-title">➕ New Punch Item</div>
<div class="field"><label>Description *</label><input type="text" id="f-desc" placeholder="e.g., Cracked tile" /></div>
<div class="field"><label>Location (Room/Floor/Dorm) *</label><input type="text" id="f-loc" placeholder="e.g., Unit 3B, 2nd Floor" /></div>
<div class="form-grid"><div class="field"><label>Priority *</label><select id="f-pri"><option value="H">🔴 High (H)</option><option value="M" selected>🟡 Medium (M)</option><option value="L">🟢 Low (L)</option></select></div>
<div class="field"><label>Initial Status</label><select id="f-status"><option value="OPEN">OPEN</option><option value="IN PROGRESS">IN PROGRESS</option><option value="FOR VERIFICATION">FOR VERIFICATION</option></select></div></div>
<div class="field"><label>📸 INSPECTION PHOTO * (Required)</label><input type="file" id="f-photo-in" accept="image/*" /><div id="photo-in-preview" style="margin-top:6px"></div></div>
<div class="field"><label>Remarks (Optional)</label><textarea id="f-notes" rows="2"></textarea></div>
<button class="submit-btn" onclick="addItem()">Create Item</button></div>

<div class="sheet-backdrop" id="exp-backdrop" onclick="closeExport()"></div>
<div class="sheet" id="exp-sheet"><div class="sheet-handle"></div><div class="sheet-title">📄 Export to PDF</div>
<div class="field"><label>Project name</label><input type="text" id="exp-proj" value="A Proposed 2-Unit 3-Storey Dormitory Building" /></div>
<div class="field"><label>Project location</label><input type="text" id="exp-loc" value="Brgy. Tambubong, San Rafael, Bulacan" /></div>
<div class="field"><label>📅 Inspection Date *</label><input type="date" id="exp-date" required /></div>
<button class="export-btn" onclick="generatePreview()">Preview & Export PDF</button></div>

<div id="preview-modal"><div class="preview-header"><button onclick="closePreview()" style="background:none;border:none;font-size:24px">✕</button><button class="generate" onclick="downloadPDF()">⬇ Download PDF</button></div>
<div class="preview-body"><div id="pdf-content"></div></div></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD4PgBtM4AEmnvMQ7sqSVwWTXzAJgc_IWI",
  authDomain: "punchlist-57de5.firebaseapp.com",
  databaseURL: "https://punchlist-57de5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "punchlist-57de5",
  storageBucket: "punchlist-57de5.firebasestorage.app",
  messagingSenderId: "617429806334",
  appId: "1:617429806334:web:6480fea0ef2826603ec9af",
  measurementId: "G-962XRCG4J4"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const FIXED_EMAIL = "kotendorm@phase5.com";
let punchItems = [];
let currentFilter = "all";
let dbRef = null;

async function checkPassword() {
  const pwd = document.getElementById('gate-password').value;
  const err = document.getElementById('gate-err');
  if (!pwd) { err.innerText = "Enter password"; return; }
  err.innerText = "Verifying...";
  try {
    const cred = await auth.signInWithEmailAndPassword(FIXED_EMAIL, pwd);
    if (cred.user) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      dbRef = db.ref('punchlist');
      initRealtimeSync();
    }
  } catch (e) {
    if (e.code === 'auth/user-not-found') err.innerText = "User not found. Contact admin.";
    else if (e.code === 'auth/wrong-password') err.innerText = "Wrong password.";
    else err.innerText = e.message;
  }
}

function initRealtimeSync() {
  const dot = document.getElementById('sync-dot');
  dot.classList.add('syncing');
  dbRef.on('value', snap => {
    const data = snap.val();
    punchItems = data ? Object.entries(data).map(([k,v]) => ({...v, firebaseKey: k})) : [];
    renderAll();
    dot.classList.remove('syncing');
    dot.classList.add('online');
  });
}

async function saveItem(item) { await dbRef.push().set(item); }
async function updateItem(key, updates) { await dbRef.child(key).update(updates); }
async function deleteItem(key) { await dbRef.child(key).remove(); }

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderAll() {
  const openCnt = punchItems.filter(i => i.status !== 'CLOSED' && i.status !== 'VOIDED').length;
  const highCnt = punchItems.filter(i => i.priority === 'H').length;
  const progCnt = punchItems.filter(i => i.status === 'IN PROGRESS').length;
  const doneCnt = punchItems.filter(i => i.status === 'CLOSED').length;
  document.getElementById('cnt-open').innerText = openCnt;
  document.getElementById('cnt-high').innerText = highCnt;
  document.getElementById('cnt-prog').innerText = progCnt;
  document.getElementById('cnt-done').innerText = doneCnt;

  let filtered = punchItems;
  if (currentFilter !== 'all') filtered = punchItems.filter(i => i.status === currentFilter);
  const container = document.getElementById('list');
  if (!filtered.length) { container.innerHTML = '<div class="empty">📋 No items</div>'; return; }
  container.innerHTML = '';
  filtered.forEach(item => {
    const statusClass = item.status === 'OPEN' ? 'badge-open' : (item.status === 'IN PROGRESS' ? 'badge-progress' : (item.status === 'CLOSED' ? 'badge-closed' : 'badge-void'));
    const priorityClass = item.priority === 'H' ? 'badge-critical' : (item.priority === 'M' ? 'badge-medium' : 'badge-low');
    const priorityLabel = item.priority === 'H' ? 'HIGH' : (item.priority === 'M' ? 'MEDIUM' : 'LOW');
    const inspThumb = item.inspectionPhoto ? `<img src="${item.inspectionPhoto}" class="photo-thumb" onclick="window.open(this.src)">` : `<div class="photo-thumb">📷</div>`;
    const closeThumb = item.closeoutPhoto ? `<img src="${item.closeoutPhoto}" class="photo-thumb" onclick="window.open(this.src)">` : `<div class="photo-thumb">🔒</div>`;
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div class="item-row">
        <div class="item-details">
          <div class="item-desc">${escapeHtml(item.desc)}</div>
          <div class="item-meta"><span class="badge badge-gray">📍 ${escapeHtml(item.location)}</span><span class="badge ${priorityClass}">⚠️ ${priorityLabel}</span><span class="badge ${statusClass}">${item.status}</span></div>
          ${item.remarks ? `<div class="item-note">📝 ${escapeHtml(item.remarks)}</div>` : ''}
        </div>
        <div class="status-pri-select">
          <select class="small-select" data-key="${item.firebaseKey}" data-field="priority" onchange="updateField(this,'priority')">
            <option value="H" ${item.priority==='H'?'selected':''}>🔴 High</option>
            <option value="M" ${item.priority==='M'?'selected':''}>🟡 Medium</option>
            <option value="L" ${item.priority==='L'?'selected':''}>🟢 Low</option>
          </select>
          <select class="small-select" data-key="${item.firebaseKey}" data-field="status" onchange="updateStatusWithCloseout(this)">
            <option value="OPEN" ${item.status==='OPEN'?'selected':''}>OPEN</option>
            <option value="IN PROGRESS" ${item.status==='IN PROGRESS'?'selected':''}>IN PROGRESS</option>
            <option value="FOR VERIFICATION" ${item.status==='FOR VERIFICATION'?'selected':''}>FOR VERIFICATION</option>
            <option value="CLOSED" ${item.status==='CLOSED'?'selected':''}>CLOSED</option>
            <option value="VOIDED" ${item.status==='VOIDED'?'selected':''}>VOIDED</option>
          </select>
          <button class="delete-btn" onclick="confirmDelete('${item.firebaseKey}')">🗑 Delete</button>
        </div>
      </div>
      <div class="photo-strip">
        <div>📸 Insp:</div> ${inspThumb}
        <div>🔒 Close-out:</div> ${closeThumb}
        <button class="upload-btn-small" onclick="uploadCloseout('${item.firebaseKey}')">Upload Close-out</button>
        <button class="upload-btn-small" onclick="editRemarks('${item.firebaseKey}')">Remarks</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

async function updateField(sel, field) { await updateItem(sel.dataset.key, { [field]: sel.value }); }

async function updateStatusWithCloseout(sel) {
  const key = sel.dataset.key;
  const newStatus = sel.value;
  const item = punchItems.find(i => i.firebaseKey === key);
  if (!item) return;
  if (newStatus === 'CLOSED' && (!item.closeoutPhoto || item.closeoutPhoto === '')) {
    alert("❌ Close-out photo required to mark CLOSED.");
    sel.value = item.status;
    return;
  }
  if (newStatus === 'CLOSED' && item.status !== 'CLOSED') {
    const remark = prompt("Closing remarks (optional):", item.remarks || "");
    if (remark !== null) await updateItem(key, { remarks: remark, status: newStatus });
    else await updateItem(key, { status: newStatus });
  } else {
    await updateItem(key, { status: newStatus });
  }
}

async function uploadCloseout(key) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    if (e.target.files[0]) {
      const base64 = await fileToBase64(e.target.files[0]);
      await updateItem(key, { closeoutPhoto: base64 });
    }
  };
  input.click();
}

async function editRemarks(key) {
  const item = punchItems.find(i => i.firebaseKey === key);
  if (item) {
    const newRem = prompt("Edit remarks:", item.remarks || "");
    if (newRem !== null) await updateItem(key, { remarks: newRem });
  }
}

async function confirmDelete(key) {
  if (confirm("⚠️ Permanently delete this item? This cannot be undone.")) {
    await deleteItem(key);
  }
}

async function addItem() {
  const desc = document.getElementById('f-desc').value.trim();
  const loc = document.getElementById('f-loc').value.trim();
  const pri = document.getElementById('f-pri').value;
  const initStatus = document.getElementById('f-status').value;
  const remarks = document.getElementById('f-notes').value.trim();
  const photo = document.getElementById('f-photo-in').files[0];
  if (!desc || !loc || !photo) { alert("Description, location, and inspection photo are required."); return; }
  const inspBase64 = await fileToBase64(photo);
  await saveItem({
    desc, location: loc, priority: pri, status: initStatus, remarks,
    inspectionPhoto: inspBase64, closeoutPhoto: "",
    createdAt: firebase.database.ServerValue.TIMESTAMP
  });
  closeAdd();
  document.getElementById('f-desc').value = '';
  document.getElementById('f-loc').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-photo-in').value = '';
  document.getElementById('photo-in-preview').innerHTML = '';
}

// PDF generation with A4 landscape, column widths, legend table, and page break avoidance
const LOGO_URL = "https://raw.githubusercontent.com/engrjai-max/engrjai-max.github.io/main/logo.png";

function generatePDFContent() {
  const inspDate = document.getElementById('exp-date').value;
  if (!inspDate) { alert("Please select Inspection Date."); return null; }
  let rows = '';
  punchItems.forEach((item, idx) => {
    const inspImg = item.inspectionPhoto ? `<img src="${item.inspectionPhoto}" class="pdf-img" crossorigin="anonymous">` : '<span>No Image</span>';
    const closeImg = item.closeoutPhoto ? `<img src="${item.closeoutPhoto}" class="pdf-img" crossorigin="anonymous">` : '<span>No Image</span>';
    rows += `<tr style="page-break-inside:avoid; break-inside:avoid;">
      <td style="text-align:center; width:5%;">${idx+1}</td>
      <td style="width:14%;">${escapeHtml(item.location)}</td>
      <td style="width:19%;">${escapeHtml(item.desc)}</td>
      <td style="text-align:center; width:6%;">${item.priority}</td>
      <td style="text-align:center; width:15%;">${inspImg}</td>
      <td style="text-align:center; width:15%;">${closeImg}</td>
      <td style="text-align:center; width:10%;">${item.status}</td>
      <td style="width:16%;">${escapeHtml(item.remarks||'')}</td>
    </tr>`;
  });
  // Legend table with background colors
  const legendHtml = `
    <table class="pdf-legend-table" style="width:100%; margin:15px 0;">
      <tr>
        <td style="background-color:#22c55e; color:#000; font-weight:bold;">OPEN</td>
        <td style="background-color:#eab308; color:#000; font-weight:bold;">IN PROGRESS</td>
        <td style="background-color:#3b82f6; color:#fff; font-weight:bold;">FOR VERIFICATION</td>
        <td style="background-color:#d946ef; color:#fff; font-weight:bold;">CLOSED</td>
        <td style="background-color:#9ca3af; color:#000; font-weight:bold;">VOIDED</td>
      </tr>
    </table>
  `;
  return `
    <div class="pdf-page">
      <div class="pdf-header-logo">
        <img src="${LOGO_URL}" class="pdf-logo-img" onerror="this.style.display='none'">
      </div>
      <div class="pdf-title">QA/QC PUNCHLIST TRACKING FORM</div>
      <div class="pdf-info-grid">
        <div><strong>Project:</strong> ${escapeHtml(document.getElementById('exp-proj').value)}<br><strong>Location:</strong> ${escapeHtml(document.getElementById('exp-loc').value)}</div>
        <div><strong>Inspection Date:</strong> ${inspDate}</div>
      </div>
      ${legendHtml}
      <table class="pdf-table" style="width:100%; table-layout:fixed;">
        <thead>
          <tr>
            <th style="width:5%">#</th>
            <th style="width:14%">LOCATION</th>
            <th style="width:19%">DESCRIPTION</th>
            <th style="width:6%">PRI</th>
            <th style="width:15%">INSPECTION PHOTO</th>
            <th style="width:15%">CLOSE-OUT PHOTO</th>
            <th style="width:10%">STATUS</th>
            <th style="width:16%">REMARKS</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
      <div class="pdf-footer">
        <div>** For Internal Use Only **</div>
        <div>TSDCI-TGRDC-QAQC-FORM</div>
      </div>
    </div>
  `;
}

async function generatePreview() {
  const htmlContent = generatePDFContent();
  if (!htmlContent) return;
  closeExport();
  document.getElementById('pdf-content').innerHTML = htmlContent;
  document.getElementById('preview-modal').classList.add('open');
}

function downloadPDF() {
  const element = document.getElementById('pdf-content');
  if (!element.innerHTML.trim()) {
    alert("Generate preview first.");
    return;
  }
  const btn = document.querySelector('#preview-modal .generate');
  btn.innerText = "⏳ Generating...";
  btn.disabled = true;
  const opt = {
    margin: [10, 10, 10, 10],
    filename: `Punchlist_${Date.now()}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
    pagebreak: { mode: ['css', 'legacy'], before: '.pdf-page' }
  };
  html2pdf().set(opt).from(element).save()
    .then(() => { btn.innerText = "Download PDF"; btn.disabled = false; closePreview(); })
    .catch(e => { alert("PDF error: " + e); btn.innerText = "Download PDF"; btn.disabled = false; });
}

function openAdd() { document.getElementById('add-backdrop').classList.add('open'); document.getElementById('add-sheet').classList.add('open'); }
function closeAdd() { document.getElementById('add-backdrop').classList.remove('open'); document.getElementById('add-sheet').classList.remove('open'); }
function openExport() { document.getElementById('exp-backdrop').classList.add('open'); document.getElementById('exp-sheet').classList.add('open'); document.getElementById('exp-date').valueAsDate = new Date(); }
function closeExport() { document.getElementById('exp-backdrop').classList.remove('open'); document.getElementById('exp-sheet').classList.remove('open'); }
function closePreview() { document.getElementById('preview-modal').classList.remove('open'); }

function initFilters() {
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      currentFilter = chip.dataset.filter;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      renderAll();
    });
  });
}

document.getElementById('f-photo-in')?.addEventListener('change', (e) => {
  const preview = document.getElementById('photo-in-preview');
  if (e.target.files && e.target.files[0]) {
    const reader = new FileReader();
    reader.onload = ev => preview.innerHTML = `<img src="${ev.target.result}" style="max-width:80px; border-radius:6px;">`;
    reader.readAsDataURL(e.target.files[0]);
  } else preview.innerHTML = '';
});

window.checkPassword = checkPassword;
window.addItem = addItem;
window.openAdd = openAdd; window.closeAdd = closeAdd;
window.openExport = openExport; window.closeExport = closeExport;
window.generatePreview = generatePreview; window.downloadPDF = downloadPDF; window.closePreview = closePreview;
window.updateField = updateField;
window.updateStatusWithCloseout = updateStatusWithCloseout;
window.uploadCloseout = uploadCloseout;
window.editRemarks = editRemarks;
window.confirmDelete = confirmDelete;
initFilters();
</script>
