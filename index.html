<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Punchlist">
<title>Punchlist</title>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<!-- JSZip for docx export -->
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#eeede9;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);--text:#1a1917;--text2:#6b6860;--text3:#9e9c97;--accent:#1d4ed8;--accent-bg:#eff6ff;--red:#b91c1c;--red-bg:#fef2f2;--orange:#c2410c;--orange-bg:#fff7ed;--amber:#92400e;--amber-bg:#fffbeb;--green:#166534;--green-bg:#f0fdf4;--radius:12px;--radius-sm:8px}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--surface:#1c1c1a;--surface2:#252523;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f0efe9;--text2:#a09e99;--text3:#6b6860;--accent:#60a5fa;--accent-bg:#1e3a5f;--red:#fca5a5;--red-bg:#450a0a;--orange:#fdba74;--orange-bg:#431407;--amber:#fcd34d;--amber-bg:#451a03;--green:#86efac;--green-bg:#052e16}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;font-size:15px;line-height:1.5}
/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0px) 16px 0;position:sticky;top:0;z-index:100}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;height:52px}
.app-title{font-size:18px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.sync-dot.online{background:#22c55e}.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:background .15s}
.icon-btn:active{background:var(--border)}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.stat{background:var(--surface);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:20px;font-weight:600;line-height:1}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
/* FILTERS */
.filters{padding:0 16px 10px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-chip{white-space:nowrap;font-size:13px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0}
.filter-chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
/* LIST */
.list{padding:0 16px;padding-bottom:calc(90px + env(safe-area-inset-bottom,0px))}
.item{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.item.done{opacity:.55}
.item-main{padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.item-check{width:22px;height:22px;flex-shrink:0;margin-top:1px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}
.item-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.item-body{flex:1;min-width:0}
.item-desc{font-size:14px;font-weight:500;line-height:1.4;word-break:break-word}
.item.done .item-desc{text-decoration:line-through}
.item-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.badge-critical{background:var(--red-bg);color:var(--red)}
.badge-high{background:var(--orange-bg);color:var(--orange)}
.badge-medium{background:var(--amber-bg);color:var(--amber)}
.badge-low{background:var(--green-bg);color:var(--green)}
.badge-open{background:var(--accent-bg);color:var(--accent)}
.badge-inprogress{background:var(--amber-bg);color:var(--amber)}
.badge-done{background:var(--green-bg);color:var(--green)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.item-note{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5}
.item-del{flex-shrink:0;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px;border-radius:6px;line-height:1}
.item-del:active{color:var(--red)}
/* PHOTO STRIP */
.photos-strip{display:flex;gap:8px;padding:0 14px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center}
.photos-strip::-webkit-scrollbar{display:none}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);cursor:pointer}
.photo-thumb:active{opacity:.75}
.photo-add-btn{width:72px;height:72px;border-radius:8px;flex-shrink:0;border:1.5px dashed var(--border2);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:11px;gap:4px}
.photo-add-icon{font-size:22px;line-height:1}
.photo-input{display:none}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.3}
.empty p{font-size:14px}
/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px}
.loading-spin{font-size:32px;display:block;margin-bottom:12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* FAB */
.fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));right:20px;width:56px;height:56px;border-radius:50%;background:var(--text);color:var(--bg);border:none;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);cursor:pointer;z-index:200;transition:transform .15s}
.fab:active{transform:scale(.92)}
/* SHEETS */
.sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;transition:opacity .25s}
.sheet-backdrop.open{display:block}
.sheet-backdrop.visible{opacity:1}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:0 16px calc(24px + env(safe-area-inset-bottom,0px));z-index:400;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:17px;font-weight:600;margin-bottom:16px}
/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
input[type=text],input[type=date],select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:15px;color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:70px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.photo-picker-thumb{width:68px;height:68px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;cursor:pointer}
.photo-picker-add{width:68px;height:68px;border-radius:8px;flex-shrink:0;border:1.5px dashed var(--border2);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:11px;gap:3px}
.photo-picker-add-icon{font-size:24px;line-height:1}
.submit-btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .15s;font-family:inherit}
.submit-btn:active{opacity:.8}
.export-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.export-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.export-btn:active{opacity:.8}
.proj-fields{background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;border:1px solid var(--border)}
/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:900;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:80dvh;border-radius:8px;object-fit:contain}
.lightbox-close{position:absolute;top:calc(16px + env(safe-area-inset-top,0px));right:16px;font-size:28px;color:#fff;cursor:pointer;background:rgba(0,0,0,.4);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.lightbox-del{margin-top:16px;background:var(--red-bg);color:var(--red);border:none;border-radius:var(--radius-sm);padding:10px 24px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.lightbox-counter{color:rgba(255,255,255,.5);font-size:13px;margin-top:10px}
.bspin{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<!-- PASSWORD GATE -->
<div id="gate" style="display:flex;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:360px">
    <div style="font-size:32px;text-align:center;margin-bottom:8px">📋</div>
    <h2 style="text-align:center;font-size:20px;font-weight:600;margin-bottom:4px">Punchlist</h2>
    <p style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:24px">TSDCI — Authorized access only</p>
    <div style="margin-bottom:12px">
      <input id="gate-input" type="password" placeholder="Enter password"
        style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none"
        onkeydown="if(event.key==='Enter')checkPass()"/>
    </div>
    <button onclick="checkPass()"
      style="width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit">
      Unlock
    </button>
    <p id="gate-err" style="text-align:center;font-size:13px;color:var(--red);margin-top:12px;display:none">Incorrect password.</p>
  </div>
</div>
<div class="topbar">
  <div class="topbar-inner">
    <div class="app-title">
      <span>📋 Punchlist</span>
      <div class="sync-dot" id="sync-dot" title="Sync status"></div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="openExport()" title="Export">⬆</button>
    </div>
  </div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-num" id="cnt-open" style="color:var(--accent)">0</div><div class="stat-lbl">Open</div></div>
  <div class="stat"><div class="stat-num" id="cnt-high" style="color:var(--red)">0</div><div class="stat-lbl">Critical</div></div>
  <div class="stat"><div class="stat-num" id="cnt-prog" style="color:var(--amber)">0</div><div class="stat-lbl">Active</div></div>
  <div class="stat"><div class="stat-num" id="cnt-done" style="color:var(--green)">0</div><div class="stat-lbl">Done</div></div>
</div>

<div class="filters">
  <div class="filter-chip active" onclick="setFilter('all',this)">All</div>
  <div class="filter-chip" onclick="setFilter('open',this)">Open</div>
  <div class="filter-chip" onclick="setFilter('inprogress',this)">In progress</div>
  <div class="filter-chip" onclick="setFilter('done',this)">Done</div>
  <div class="filter-chip" onclick="setFilter('critical',this)">🔴 Critical</div>
  <div class="filter-chip" onclick="setFilter('high',this)">🟠 High</div>
</div>

<div class="list" id="list"><div class="loading"><span class="loading-spin">⏳</span>Connecting to sync…</div></div>

<button class="fab" onclick="openAdd()">+</button>

<input type="file" class="photo-input" id="photo-input-form" accept="image/*" multiple onchange="handleFormPhotos(event)">
<input type="file" class="photo-input" id="photo-input-item" accept="image/*" multiple onchange="handleItemPhotos(event)">

<!-- ADD SHEET -->
<div class="sheet-backdrop" id="add-backdrop" onclick="closeAdd()"></div>
<div class="sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Add punchlist item</div>
  <div class="field"><label>Description *</label><input type="text" id="f-desc" placeholder="e.g. Cracked tile in lobby corridor…"/></div>
  <div class="field"><label>Location / Area</label><input type="text" id="f-loc" placeholder="e.g. Unit 3B, Floor 2…"/></div>
  <div class="form-grid">
    <div class="field"><label>Priority</label>
      <select id="f-pri">
        <option value="critical">🔴 Critical</option>
        <option value="high">🟠 High</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
    <div class="field"><label>Due date</label><input type="date" id="f-due"/></div>
  </div>
  <div class="field"><label>Assigned to</label><input type="text" id="f-assign" placeholder="Name or trade…"/></div>
  <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Additional details, measurements…"></textarea></div>
  <div class="field">
    <label>Photos</label>
    <div class="photo-picker-row" id="form-photo-row">
      <div class="photo-picker-add" onclick="triggerFormPhoto()">
        <span class="photo-picker-add-icon">📷</span><span>Add photo</span>
      </div>
    </div>
  </div>
  <button class="submit-btn" onclick="addItem()">Add to punchlist</button>
</div>

<!-- EXPORT SHEET -->
<div class="sheet-backdrop" id="exp-backdrop" onclick="closeExport()"></div>
<div class="sheet" id="exp-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Export</div>
  <div class="proj-fields">
    <div class="field" style="margin-bottom:8px"><label>Project name</label><input type="text" id="exp-proj" placeholder="Project name…"/></div>
    <div class="field" style="margin-bottom:8px"><label>Project location</label><input type="text" id="exp-loc" placeholder="Project location…" value="Brgy. Tambubong, San Rafael, Bulacan"/></div>
    <div class="field" style="margin-bottom:0"><label>Inspection date</label><input type="date" id="exp-date"/></div>
  </div>
  <button class="export-btn" id="docx-btn" onclick="exportDocx()">📄 Export as QAQC Form (.docx)</button>
  <button class="export-btn secondary" onclick="copyExportText()">📋 Copy as plain text</button>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="Inspection photo" onclick="event.stopPropagation()">
  <div class="lightbox-counter" id="lightbox-counter"></div>
  <button class="lightbox-del" onclick="deleteCurrentPhoto(event)">🗑 Delete photo</button>
</div>

// ── SYNC DOT ──
function setSyncStatus(s){ // "syncing" | "online" | "error"
  const d = document.getElementById("sync-dot");
  d.className = "sync-dot " + s;
  d.title = s === "online" ? "Synced" : s === "syncing" ? "Syncing…" : "Sync error";
}

// ── FIREBASE REAL-TIME LISTENER ──
// Photos can be large base64 strings — store them separately under punchlist/photos/{id}
// Items stored without photos for fast list syncing
itemsRef.on("value", snapshot => {
  const val = snapshot.val() || {};
  // Rebuild items array preserving local photo data while remote updates arrive
  const newItems = Object.values(val).sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
  // For each item, check if we have photos locally that haven't synced yet
  items = newItems.map(remote => {
    const local = items.find(i => i.id === remote.id);
    return { ...remote, photos: remote.photos || (local ? local.photos : []) || [] };
  });
  setSyncStatus("online");
  render();
}, err => {
  console.error("Firebase error:", err);
  setSyncStatus("error");
});

// Monitor connection state
db.ref(".info/connected").on("value", snap => {
  if (!snap.val()) setSyncStatus("error");
});

// ── WRITE HELPERS ──
function fbSet(item) {
  setSyncStatus("syncing");
  // Flatten photos to save bandwidth — Firebase Realtime DB has a 10MB node limit
  // Photos are stored inline (base64 jpeg ~50-100KB each, max 2 per item)
  return itemsRef.child(item.id).set(item)
    .then(() => setSyncStatus("online"))
    .catch(err => { console.error(err); setSyncStatus("error"); });
}

function fbRemove(id) {
  setSyncStatus("syncing");
  return itemsRef.child(id).remove()
    .then(() => setSyncStatus("online"))
    .catch(err => { console.error(err); setSyncStatus("error"); });
}

// ── SHEET CONTROLS ──
function openAdd() {
  formPhotos = []; renderFormPhotos();
  ["f-desc","f-loc","f-assign","f-notes","f-due"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("f-pri").value = "medium";
  openSheet("add");
  setTimeout(() => document.getElementById("f-desc").focus(), 350);
}
function closeAdd() { closeSheet("add"); }
function openExport() {
  document.getElementById("exp-date").value = new Date().toISOString().split("T")[0];
  openSheet("exp");
}
function closeExport() { closeSheet("exp"); }
function openSheet(n) {
  const b = document.getElementById(n+"-backdrop"), s = document.getElementById(n+"-sheet");
  b.classList.add("open");
  requestAnimationFrame(() => { b.classList.add("visible"); s.classList.add("open"); });
}
function closeSheet(n) {
  const b = document.getElementById(n+"-backdrop"), s = document.getElementById(n+"-sheet");
  b.classList.remove("visible"); s.classList.remove("open");
  setTimeout(() => b.classList.remove("open"), 300);
}

// ── PHOTO HELPERS ──
function triggerFormPhoto() { document.getElementById("photo-input-form").value = ""; document.getElementById("photo-input-form").click(); }
function handleFormPhotos(e) { Promise.all(Array.from(e.target.files).map(fileToBase64)).then(r => { formPhotos = formPhotos.concat(r); renderFormPhotos(); }); }
function renderFormPhotos() {
  const row = document.getElementById("form-photo-row"); row.innerHTML = "";
  formPhotos.forEach((src, idx) => { const img = document.createElement("img"); img.className = "photo-picker-thumb"; img.src = src; img.onclick = () => openLightboxInline(formPhotos, idx, null); row.appendChild(img); });
  const btn = document.createElement("div"); btn.className = "photo-picker-add"; btn.innerHTML = '<span class="photo-picker-add-icon">📷</span><span>Add photo</span>'; btn.onclick = triggerFormPhoto; row.appendChild(btn);
}
function triggerItemPhoto(id) { currentPhotoItemId = id; document.getElementById("photo-input-item").value = ""; document.getElementById("photo-input-item").click(); }
function handleItemPhotos(e) {
  if (currentPhotoItemId === null) return;
  const item = items.find(i => i.id === currentPhotoItemId); if (!item) return;
  Promise.all(Array.from(e.target.files).map(fileToBase64)).then(r => {
    item.photos = (item.photos || []).concat(r);
    fbSet(item);
  });
}
function fileToBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const maxW = 1000, maxH = 1000;
        let w = img.width, h = img.height;
        if (w > maxW || h > maxH) { const r = Math.min(maxW/w, maxH/h); w = Math.round(w*r); h = Math.round(h*r); }
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", 0.75));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── LIGHTBOX ──
function openLightbox(id, idx) { const item = items.find(i => i.id === id); if (!item || !(item.photos||[]).length) return; lightboxItemId = id; lightboxPhotoIdx = idx; lightboxPhotos = item.photos; showLb(); }
function openLightboxInline(photos, idx, id) { lightboxItemId = id; lightboxPhotoIdx = idx; lightboxPhotos = photos; showLb(); }
function showLb() { document.getElementById("lightbox-img").src = lightboxPhotos[lightboxPhotoIdx]; document.getElementById("lightbox-counter").textContent = lightboxPhotos.length > 1 ? `${lightboxPhotoIdx+1} / ${lightboxPhotos.length}` : ""; document.getElementById("lightbox").classList.add("open"); document.querySelector(".lightbox-del").style.display = lightboxItemId !== null ? "block" : "none"; }
function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); }
function deleteCurrentPhoto(e) {
  e.stopPropagation(); if (lightboxItemId === null) return;
  if (!confirm("Delete this photo?")) return;
  const item = items.find(i => i.id === lightboxItemId); if (!item) return;
  item.photos.splice(lightboxPhotoIdx, 1);
  fbSet(item);
  if (!item.photos.length) { closeLightbox(); return; }
  lightboxPhotoIdx = Math.min(lightboxPhotoIdx, item.photos.length - 1);
  lightboxPhotos = item.photos; showLb();
}
let lbTouchX = 0;
document.getElementById("lightbox-img").addEventListener("touchstart", e => { lbTouchX = e.touches[0].clientX; }, {passive:true});
document.getElementById("lightbox-img").addEventListener("touchend", e => { const dx = e.changedTouches[0].clientX - lbTouchX; if (Math.abs(dx) < 40) return; lightboxPhotoIdx = (lightboxPhotoIdx + (dx < 0 ? 1 : -1) + lightboxPhotos.length) % lightboxPhotos.length; showLb(); }, {passive:true});

// ── ADD / EDIT / DELETE ──
function addItem() {
  const desc = document.getElementById("f-desc").value.trim();
  if (!desc) { document.getElementById("f-desc").focus(); return; }
  const id = "item_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
  const item = {
    id, desc,
    loc: document.getElementById("f-loc").value.trim(),
    pri: document.getElementById("f-pri").value,
    assign: document.getElementById("f-assign").value.trim(),
    notes: document.getElementById("f-notes").value.trim(),
    due: document.getElementById("f-due").value,
    status: "open",
    photos: [...formPhotos],
    createdAt: Date.now(),
    created: new Date().toLocaleDateString("en-US", {month:"short", day:"numeric"})
  };
  fbSet(item);
  closeAdd();
}

function cycleStatus(id) {
  const item = items.find(i => i.id === id); if (!item) return;
  const cycle = {open:"inprogress", inprogress:"done", done:"open"};
  item.status = cycle[item.status];
  fbSet(item);
}

function deleteItem(id) {
  if (!confirm("Delete this item?")) return;
  fbRemove(id);
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  render();
}

// ── RENDER ──
function render() {
  document.getElementById("cnt-open").textContent = items.filter(i => i.status === "open").length;
  document.getElementById("cnt-high").textContent = items.filter(i => i.pri === "critical").length;
  document.getElementById("cnt-prog").textContent = items.filter(i => i.status === "inprogress").length;
  document.getElementById("cnt-done").textContent = items.filter(i => i.status === "done").length;

  let visible = items.filter(i => {
    if (filter === "all") return true;
    if (["open","inprogress","done"].includes(filter)) return i.status === filter;
    if (["critical","high"].includes(filter)) return i.pri === filter;
    return true;
  });

  const list = document.getElementById("list");
  if (!visible.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>${filter !== "all" ? "No items match this filter." : "No items yet.<br>Tap + to add your first punchlist item."}</p></div>`;
    return;
  }

  list.innerHTML = visible.map(item => {
    const photos = item.photos || [], due = item.due ? new Date(item.due+"T00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "";
    const strip = photos.length
      ? `<div class="photos-strip">${photos.map((src,idx)=>`<img class="photo-thumb" src="${src}" onclick="openLightbox('${item.id}',${idx})">`).join("")}<div class="photo-add-btn" onclick="triggerItemPhoto('${item.id}')"><span class="photo-add-icon">📷</span><span>Add</span></div></div>`
      : `<div style="padding:0 14px 12px"><div class="photo-add-btn" style="width:100%;height:44px;flex-direction:row;gap:6px;border-radius:8px" onclick="triggerItemPhoto('${item.id}')"><span style="font-size:16px">📷</span><span style="font-size:12px;color:var(--text2)">Add photo</span></div></div>`;
    return `<div class="item ${item.status==="done"?"done":""}" data-id="${item.id}">
      <div class="item-main">
        <div class="item-check ${item.status==="done"?"checked":""}" onclick="cycleStatus('${item.id}')">${item.status==="done"?"✓":""}</div>
        <div class="item-body">
          <div class="item-desc">${escHtml(item.desc)}</div>
          <div class="item-meta">
            <span class="badge badge-${item.pri}">${priLabel[item.pri]}</span>
            <span class="badge badge-${item.status}" onclick="cycleStatus('${item.id}')" style="cursor:pointer">${statLabel[item.status]}</span>
            ${item.loc?`<span class="badge badge-gray">📍 ${escHtml(item.loc)}</span>`:""}
            ${item.assign?`<span class="badge badge-gray">👤 ${escHtml(item.assign)}</span>`:""}
            ${due?`<span class="badge badge-gray">📅 ${due}</span>`:""}
            ${photos.length?`<span class="badge badge-gray">📷 ${photos.length}</span>`:""}
          </div>
          ${item.notes?`<div class="item-note">${escHtml(item.notes)}</div>`:""}
        </div>
        <button class="item-del" onclick="deleteItem('${item.id}')" aria-label="Delete">✕</button>
      </div>${strip}</div>`;
  }).join("");
}

function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── PLAIN TEXT EXPORT ──
function copyExportText() {
  const proj = document.getElementById("exp-proj").value.trim() || "Punchlist";
  const loc  = document.getElementById("exp-loc").value.trim();
  const dv   = document.getElementById("exp-date").value;
  const ds   = dv ? new Date(dv+"T00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}) : "";
  const pmap = {critical:"H",high:"H",medium:"M",low:"L"};
  const smap = {open:"OPEN",inprogress:"IN PROGRESS",done:"CLOSED"};
  let txt = `${proj}\nLocation: ${loc}\nInspection Date: ${ds}\n${"=".repeat(44)}\n\n`;
  items.forEach((i,n) => {
    txt += `[${n+1}] ${i.desc}\n  Priority: ${pmap[i.pri]}  |  Status: ${smap[i.status]||"OPEN"}\n`;
    if (i.loc)    txt += `  Location: ${i.loc}\n`;
    if (i.assign) txt += `  Assigned: ${i.assign}\n`;
    if (i.due)    txt += `  Due: ${new Date(i.due+"T00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}\n`;
    if (i.notes)  txt += `  Notes: ${i.notes}\n`;
    if ((i.photos||[]).length) txt += `  Photos: ${i.photos.length} attached\n`;
    txt += "\n";
  });
  navigator.clipboard.writeText(txt).then(() => {
    const b = document.querySelector(".export-btn.secondary");
    b.textContent = "✅ Copied!";
    setTimeout(() => b.textContent = "📋 Copy as plain text", 2000);
  });
}

// ── DOCX EXPORT ──
async function exportDocx() {
  if (!window.JSZip) { alert("JSZip not loaded. Check internet connection."); return; }
  const btn = document.getElementById("docx-btn");
  btn.innerHTML = '<span class="bspin">⏳</span> Generating…'; btn.disabled = true;
  try {
    await new Promise(r => setTimeout(r, 50));
    const projName = document.getElementById("exp-proj").value.trim() || "A Proposed 2-Unit 3-Storey Dormitory Building";
    const projLoc  = document.getElementById("exp-loc").value.trim()  || "Brgy. Tambubong, San Rafael, Bulacan";
    const dv       = document.getElementById("exp-date").value;
    const inspDate = dv ? new Date(dv+"T00:00").toLocaleDateString("en-PH",{year:"numeric",month:"long",day:"numeric"}) : new Date().toLocaleDateString("en-PH",{year:"numeric",month:"long",day:"numeric"});
    const blob = await buildDocx(projName, projLoc, inspDate, items);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `QAQC-Form-${new Date().toISOString().split("T")[0]}.docx`; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    btn.innerHTML = "✅ Downloaded!";
    setTimeout(() => { btn.innerHTML = "📄 Export as QAQC Form (.docx)"; btn.disabled = false; }, 3000);
  } catch(err) {
    console.error(err);
    btn.innerHTML = "❌ Error — try again"; btn.disabled = false;
    setTimeout(() => btn.innerHTML = "📄 Export as QAQC Form (.docx)", 3000);
  }
}

  const docRels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/><Relationship Id="rId8" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/header" Target="header1.xml"/><Relationship Id="rId9" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/footer" Target="footer1.xml"/>${imageEntries.map(e=>`<Relationship Id="${e.rId}" Type="${imgRelType}" Target="media/${e.name}.${e.ext}"/>`).join("")}</Relationships>`;
  const hdrRels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="${logoRId}" Type="${imgRelType}" Target="media/logo.png"/></Relationships>`;
  const ctypes=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Default Extension="png" ContentType="image/png"/><Default Extension="jpg" ContentType="image/jpeg"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/word/header1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.header+xml"/><Override PartName="/word/footer1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.footer+xml"/></Types>`;
  const appRels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`;
  const stylesXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Arial Narrow" w:hAnsi="Arial Narrow"/><w:sz w:val="20"/></w:rPr></w:rPrDefault></w:docDefaults><w:style w:type="paragraph" w:styleId="Normal"><w:name w:val="Normal"/></w:style><w:style w:type="paragraph" w:styleId="Header"><w:name w:val="header"/><w:basedOn w:val="Normal"/></w:style><w:style w:type="paragraph" w:styleId="Footer"><w:name w:val="footer"/><w:basedOn w:val="Normal"/></w:style><w:style w:type="table" w:styleId="TableGrid"><w:name w:val="Table Grid"/><w:tblPr><w:tblBorders><w:top w:val="single" w:sz="4" w:space="0" w:color="auto"/><w:left w:val="single" w:sz="4" w:space="0" w:color="auto"/><w:bottom w:val="single" w:sz="4" w:space="0" w:color="auto"/><w:right w:val="single" w:sz="4" w:space="0" w:color="auto"/><w:insideH w:val="single" w:sz="4" w:space="0" w:color="auto"/><w:insideV w:val="single" w:sz="4" w:space="0" w:color="auto"/></w:tblBorders></w:tblPr></w:style></w:styles>`;

  const zip = new JSZip();
  zip.file("[Content_Types].xml", ctypes);
  zip.file("_rels/.rels", appRels);
  zip.file("word/document.xml", docXml);
  zip.file("word/styles.xml", stylesXml);
  zip.file("word/header1.xml", hdrXml);
  zip.file("word/footer1.xml", ftrXml);
  zip.file("word/_rels/document.xml.rels", docRels);
  zip.file("word/_rels/header1.xml.rels", hdrRels);
  for (const e of imageEntries) {
    zip.file(`word/media/${e.name}.${e.ext}`, e.dataUrl.replace(/^data:[^;]+;base64,/,""), {base64:true});
  }
  return zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
}

// ── SWIPE TO CLOSE SHEETS ──
let touchStartY = 0;
document.querySelectorAll(".sheet").forEach(sheet => {
  sheet.addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, {passive:true});
  sheet.addEventListener("touchend", e => {
    if (e.changedTouches[0].clientY - touchStartY > 80) {
      if (sheet.id === "add-sheet") closeAdd();
      if (sheet.id === "exp-sheet") closeExport();
    }
  }, {passive:true});
});
document.getElementById("f-desc").addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });
</script>
