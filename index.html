<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Punchlist">
<title>Punchlist</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#eeede9;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);--text:#1a1917;--text2:#6b6860;--text3:#9e9c97;--accent:#1d4ed8;--accent-bg:#eff6ff;--red:#b91c1c;--red-bg:#fef2f2;--orange:#c2410c;--orange-bg:#fff7ed;--amber:#92400e;--amber-bg:#fffbeb;--green:#166534;--green-bg:#f0fdf4;--radius:12px;--radius-sm:8px}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--surface:#1c1c1a;--surface2:#252523;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f0efe9;--text2:#a09e99;--text3:#6b6860;--accent:#60a5fa;--accent-bg:#1e3a5f;--red:#fca5a5;--red-bg:#450a0a;--orange:#fdba74;--orange-bg:#431407;--amber:#fcd34d;--amber-bg:#451a03;--green:#86efac;--green-bg:#052e16}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;font-size:15px;line-height:1.5}

/* GATE */
#gate{display:flex;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center;padding:24px}
.gate-box{width:100%;max-width:360px}
.gate-logo{font-size:36px;text-align:center;margin-bottom:8px}
.gate-title{text-align:center;font-size:20px;font-weight:600;margin-bottom:4px}
.gate-sub{text-align:center;font-size:13px;color:var(--text2);margin-bottom:28px}
.gate-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px 14px;font-size:16px;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;margin-bottom:12px;letter-spacing:.05em}
.gate-input:focus{border-color:var(--accent)}
.gate-btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.gate-btn:active{opacity:.8}
.gate-err{text-align:center;font-size:13px;color:var(--red);margin-top:12px;min-height:20px}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0px) 16px 0;position:sticky;top:0;z-index:100}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;height:52px}
.app-title{font-size:18px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.
