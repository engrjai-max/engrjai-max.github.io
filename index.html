<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>TSDCI QA/QC Punchlist | Supabase</title>

  <!-- Third-party libs (UMD builds, loaded before ES modules) -->
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ── Login Gate ─────────────────────────────────────── -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">🔨</div>
    <h2 class="gate-title">TSDCI QA/QC Punchlist</h2>
    <p class="gate-sub">Construction quality tracking system</p>
    <div>
      <input type="email" id="login-email" class="gate-input"
             value="kotendorm@phase5.com" placeholder="Email"
             readonly disabled style="background:#e5e7e6">
      <input type="password" id="login-password" class="gate-input"
             placeholder="Password (shared account)" autocomplete="off">
      <button class="gate-btn" id="online-login-btn">🔐 Sign in &amp; Sync Cloud</button>
    </div>
    <div class="divider">OR</div>
    <button class="gate-btn gate-offline-btn" id="offline-mode-btn">📴 Continue Offline (local only)</button>
    <p id="gate-err" style="color:var(--red);margin-top:12px;font-size:13px;text-align:center"></p>
  </div>
</div>

<!-- ── Main App ───────────────────────────────────────── -->
<div id="main-app" style="display:none">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="app-title">
        <span>📋 Punchlist</span>
        <div class="sync-dot" id="sync-dot"></div>
      </div>
      <div class="topbar-btns">
        <button class="icon-btn" id="exportPdfBtn" title="Export PDF">📄</button>
        <button class="icon-btn" id="logoutBtn"    title="Lock">🔒</button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="cnt-open">0</div><div class="stat-lbl">Open</div></div>
    <div class="stat"><div class="stat-num" id="cnt-high">0</div><div class="stat-lbl">Critical (H)</div></div>
    <div class="stat"><div class="stat-num" id="cnt-prog">0</div><div class="stat-lbl">In Progress</div></div>
    <div class="stat"><div class="stat-num" id="cnt-done">0</div><div class="stat-lbl">Closed</div></div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters-container">
    <div class="filter-chip active"  data-filter="all">All</div>
    <div class="filter-chip" data-filter="OPEN">Open</div>
    <div class="filter-chip" data-filter="IN PROGRESS">In Progress</div>
    <div class="filter-chip" data-filter="FOR VERIFICATION">For Verification</div>
    <div class="filter-chip" data-filter="CLOSED">Closed</div>
    <div class="filter-chip" data-filter="VOIDED">Voided</div>
    <div class="select-actions">
      <button class="select-btn" id="selectAllBtn">☐ Select All</button>
      <button class="select-btn" id="deleteSelectedBtn">🗑 Delete</button>
    </div>
  </div>

  <!-- Item list -->
  <div class="list" id="list"><div class="empty">Loading items…</div></div>

  <button class="fab" id="addFab">+</button>
  <div class="toast" id="toastMsg"></div>

  <!-- Add Sheet -->
  <div class="sheet-backdrop" id="add-backdrop"></div>
  <div class="sheet" id="add-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">➕ New Punch Item</div>
    <div class="field">
      <label>Description *</label>
      <input type="text" id="f-desc" placeholder="e.g., Cracked tile, missing grout">
    </div>
    <div class="field">
      <label>Location (Room/Floor) *</label>
      <input type="text" id="f-loc" placeholder="e.g., Unit 3B, 2nd Floor">
    </div>
    <div class="form-grid">
      <div class="field">
        <label>Priority *</label>
        <select id="f-pri">
          <option value="H">🔴 High (H)</option>
          <option value="M" selected>🟡 Medium (M)</option>
          <option value="L">🟢 Low (L)</option>
        </select>
      </div>
      <div class="field">
        <label>Initial Status</label>
        <select id="f-status">
          <option value="OPEN">OPEN</option>
          <option value="IN PROGRESS">IN PROGRESS</option>
          <option value="FOR VERIFICATION">FOR VERIFICATION</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>📸 Inspection Photo * (Required)</label>
      <input type="file" id="f-photo-in" accept="image/*">
      <div id="photo-in-preview" style="margin-top:6px"></div>
      <div class="upload-progress" id="upload-progress-insp">
        <span id="upload-pct-insp">0</span>% uploading...
      </div>
    </div>
    <div class="field">
      <label>Remarks (Optional)</label>
      <textarea id="f-notes" rows="2"></textarea>
    </div>
    <button class="submit-btn" id="addItemBtn">Create Item</button>
  </div>

  <!-- Export Sheet -->
  <div class="sheet-backdrop" id="exp-backdrop"></div>
  <div class="sheet" id="exp-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📄 Export to PDF</div>
    <div class="field">
      <label>Project name</label>
      <input type="text" id="exp-proj" value="A Proposed 2-Unit 3-Storey Dormitory Building">
    </div>
    <div class="field">
      <label>Project location</label>
      <input type="text" id="exp-loc" value="Brgy. Tambubong, San Rafael, Bulacan">
    </div>
    <div class="field">
      <label>📅 Inspection Date *</label>
      <input type="date" id="exp-date" required>
    </div>
    <button class="export-btn" id="previewPdfBtn">Preview &amp; Export PDF</button>
  </div>

  <!-- PDF Preview Modal -->
  <div id="preview-modal">
    <div class="preview-header">
      <button id="closePreviewBtn" style="background:none;border:none;font-size:24px;cursor:pointer">✕</button>
      <button class="export-btn" id="downloadPdfBtn" style="width:auto;padding:10px 20px">⬇ Download PDF</button>
    </div>
    <div class="preview-body">
      <div id="pdf-content"></div>
    </div>
  </div>

</div><!-- /#main-app -->

<!-- App entry point (ES module) -->
<script type="module" src="js/main.js"></script>

</body>
</html>
